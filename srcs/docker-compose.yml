services:
  mariadb:
    build: requirements/mariadb/.
    image: mariadb:v0.1
    container_name: mariadb
    restart: always
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
    secrets:
      - db_password
      - db_root_password
    networks:
      - my-net
    volumes:
      - db_data:/var/lib/mysql
  wordpress:
    build: requirements/wordpress/.
    image: wordpress:v0.1
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    networks:
      - my-net
    volumes:
      - wordpress_data:/var/www/html
    environment:
      URL: ${URL}
      TITLE: ${TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_ROLE: ${WP_ROLE}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_HOST_PORT: ${DB_HOST_PORT}
      DB_HOST: ${DB_HOST}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
  nginx:
    build:
      context: requirements/nginx
      args:
        COUNTRY: ${COUNTRY}
        STATE: ${STATE}
        LOCALITY: ${LOCALITY}
        ORGANIZATION: ${ORGANIZATION}
        UNIT: ${UNIT}
        COMMON_NAME: ${COMMON_NAME}
    image: nginx:v0.1
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    networks:
      - my-net
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "443:443"
networks:
  my-net:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mobouifr/data/www

  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mobouifr/data/mariadb